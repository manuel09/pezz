services:
  - type: web
    name: itahub
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_RESULTS
        value: "25"
      - key: PUBLIC_HOST
        value: https://itahub.onrender.com
      # WARP non funziona su Render (no TUN/binary). Lascia disabilitato.
      # Se hai un VPS, metti WARP_CONFIG=auto per bypassare Cloudflare.
      - key: WARP_CONFIG
        value: off
    healthCheckPath: /manifest.json
